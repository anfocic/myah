name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same PR / branch — no point burning minutes on
# stale commits. This is especially helpful on stacked PRs where the user
# force-pushes frequently.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        # Runs with pragmatic defaults (see pyproject.toml [tool.mypy]).
        # Catches real bugs without forcing every test helper to carry
        # annotations. Tighten `check_untyped_defs` later.
        run: mypy .

      - name: Tests (pytest with coverage)
        # Coverage gate set in pyproject at fail_under=80. Mia's tests
        # don't require a live Ollama daemon — they use scripted state
        # and stub callables (FakeProvider in test_integration).
        run: pytest tests/ --cov --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        # Only upload once per matrix run — the 3.12 job is authoritative.
        # Other Python versions still run the gate locally via pytest-cov.
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false  # Codecov outages shouldn't break CI
